<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 · Page Not Found</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f7fb;
        color: #1b1f2a;
      }
      main {
        text-align: center;
        padding: 2rem;
        max-width: 36rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(2rem, 6vw, 3rem);
      }
      p {
        margin: 0.5rem 0;
        line-height: 1.6;
      }
      a {
        display: inline-block;
        margin-top: 1.25rem;
        text-decoration: none;
        font-weight: 600;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0d1117;
          color: #e6edf3;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>Sorry, we couldn’t find that page.</p>
      <p>If you add client-side routing later, configure route rewrites in <code>vercel.json</code> (for example, <code>/app/:path*</code> → <code>/index.html</code>).</p>
      <a href="/">← Back to the Markdown converter</a>
    </main>
  </body>
</html>
