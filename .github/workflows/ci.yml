name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: HTML/CSS/JS lint
        run: npm run lint

      - name: Link/meta validation
        run: npm run check:meta

      - name: Basic static smoke checks
        run: npm run check:smoke
